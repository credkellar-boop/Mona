name: Mona CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-node-version: '3.10'
        cache: 'pip' # Automatically caches pip packages to speed up subsequent runs

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1-mesa-glx libglib2.0-0

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio

    - name: Run Integration Test Suite
      env:
        # Pass a dummy string for the API key during CI so the test suite compiles smoothly
        GEMINI_API_KEY: "ci_test_dummy_key"
      run: |
        pytest tests/test_integration.py -v
